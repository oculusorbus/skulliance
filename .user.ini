; Move PHP session files out of CageFS's hidden /tmp and into a path
; under the user's home directory. This makes the files visible to
; SSH/cPanel commands (du, find, ls) and lets a cleanup cron prune
; abandoned sessions directly.
;
; The directory must exist on the server before this takes effect:
;   mkdir -p /home/jeremiah/php-sessions-skulliance
;   chmod 700 /home/jeremiah/php-sessions-skulliance
;
; After uploading, suggested cleanup cron (weekly, 4am Sunday,
; removes files older than 35 days — past the 31-day login lifetime
; set in process-oauth.php):
;
;   0 4 * * 0 find /home/jeremiah/php-sessions-skulliance -type f -mtime +35 -delete
session.save_path = "/home/jeremiah/php-sessions-skulliance"
